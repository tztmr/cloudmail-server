version: '3.8'

services:
  cloudmail:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudmail:latest
    container_name: cloudmail
    restart: unless-stopped
    ports:
      - "3000:3000"   # Web UI + API
      - "2525:2525"   # Built-in SMTP receiver (inbound)
      # For real port 25 (requires root or NET_ADMIN in some envs):
      # - "25:2525"
    env_file:
      - .env
    environment:
      # 以下变量优先从根目录 .env 读取（cloudmail.sh 会自动生成/引导配置）
      - JWT_SECRET=${JWT_SECRET:-请替换为强随机字符串至少32位}
      - ADMIN=${ADMIN:-admin@yourdomain.com}
      - DOMAIN=${DOMAIN:-["yourdomain.com"]}

      - PORT=${PORT:-3000}
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - SMTP_PORT=${SMTP_PORT:-2525}
      # - ANALYSIS_CACHE=${ANALYSIS_CACHE:-false}

      - DATA_DIR=${DATA_DIR:-/app/data}
      - STATIC_DIR=${STATIC_DIR:-/app/mail-worker/dist}
    volumes:
      - cloudmail-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/setting/websiteConfig', (r)=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  cloudmail-data:
    driver: local
