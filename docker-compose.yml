services:
  cloudmail:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudmail-server:latest
    container_name: cloudmail-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      SMTP_ENABLED: ${SMTP_ENABLED:-true}
      SMTP_PORT: ${SMTP_PORT:-2525}
      DATA_DIR: ${DATA_DIR:-/app/data}
      STATIC_DIR: ${STATIC_DIR:-/app/mail-worker/dist}
      JWT_SECRET: ${JWT_SECRET:-change-me-at-least-32-random-chars}
      ADMIN: ${ADMIN:-admin@yourdomain.com}
      DOMAIN: ${DOMAIN:-["yourdomain.com"]}
    ports:
      - "${PORT:-3000}:3000"
      - "${SMTP_PUBLIC_PORT:-2525}:2525"
      # 生产收信通常需要宿主机 25 端口：
      # - "25:2525"
    volumes:
      - cloudmail-data:/app/data

volumes:
  cloudmail-data:
    driver: local
